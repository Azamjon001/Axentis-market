# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name axentis.uz www.axentis.uz;
    return 301 https://axentis.uz$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name axentis.uz www.axentis.uz;

    ssl_certificate /etc/letsencrypt/live/axentis.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/axentis.uz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/axentis.uz/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 20M;

    # Единый root: витрина покупателя в корне, панели бизнеса в подпапке
    # /business. Деплой: web-customer/* → html/, build/* → html/business/.
    root /usr/share/nginx/html;
    index index.html;

    # 🏢 Панели бизнеса (продавец / админ / курьер / реф-агент) — под /business.
    location /business {
        try_files $uri $uri/ /business/index.html;
    }

    # 🛒 Витрина покупателя = приложение Homepage, собранное для веба
    # (Expo Web). Это и есть axentis.uz — 1:1 с мобильным приложением.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🔗 Смарт-ссылки шаринга axentis.uz/product/:id и /company/:id.
    # Соцботы (Telegram, WhatsApp, Instagram…) получают OG-превью с фото и
    # ценой; обычный браузер получает витрину (SPA сама откроет товар/магазин,
    # а при установленном приложении сработают App Links). Разделяем по
    # User-Agent — как это делает Яндекс Маркет.
    location ~ ^/(product|company)/\d+$ {
        if ($http_user_agent ~* "(bot|facebookexternalhit|Twitterbot|WhatsApp|Telegram|vkShare|Slackbot|LinkedInBot|Discordbot|Googlebot|Applebot|Pinterest|redditbot|Instagram|Skype|Viber)") {
            proxy_pass http://backend:3000/share$request_uri;
        }
        try_files $uri /index.html;
    }

    # 🔍 SEO: robots.txt и sitemap.xml генерирует бэкенд (список товаров/магазинов)
    location = /robots.txt {
        proxy_pass http://backend:3000/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /sitemap.xml {
        proxy_pass http://backend:3000/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 📱 Android App Links: подтверждение владения доменом для приложения
    location = /.well-known/assetlinks.json {
        default_type application/json;
        root /usr/share/nginx/html;
    }

    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 20M;
        proxy_request_buffering off;
    }

    location /uploads {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /socket.io {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Let's Encrypt certificate renewal challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
